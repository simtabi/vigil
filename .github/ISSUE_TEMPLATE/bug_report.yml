name: Bug report
description: Report a problem with mta
labels: [bug]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. mta config init
        2. mta install
        3. ...
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options: [macOS, Windows, Linux]
    validations:
      required: true
  - type: dropdown
    id: engine
    attributes:
      label: Engine
      options: [input, graph, both]
    validations:
      required: true
  - type: textarea
    id: doctor
    attributes:
      label: Output of `mta doctor`
      render: shell
  - type: input
    id: version
    attributes:
      label: Version (`mta version`)
    validations:
      required: true
