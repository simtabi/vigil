name: Build binaries

# Reusable matrix build — the single source of truth for compiling/bundling.
# Targets come from build/targets.txt and the build logic from scripts/build-all.sh,
# so local `make dist` and CI stay identical. Linux/Windows/BSD cross-compile
# CGO-free on one Linux runner; macOS needs cgo on native runners.
on:
  workflow_call:
    inputs:
      version:
        description: Version stamped into binaries and archives.
        required: true
        type: string

permissions:
  contents: read

jobs:
  cross:
    name: linux / windows / bsd (cross)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: '1.23'
          check-latest: true
      - name: install nfpm
        run: |
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: build + bundle
        run: MTA_SCOPE=cross MTA_PACKAGES=1 MTA_CHECKSUMS=0 ./scripts/build-all.sh "${{ inputs.version }}"
      - uses: actions/upload-artifact@v4
        with:
          name: dist-cross
          path: out/*
          retention-days: 14

  mac:
    name: macos apple-silicon + intel + universal (cgo)
    # One Apple-Silicon runner builds arm64 natively and cross-builds amd64 via
    # clang, then lipo-merges a universal binary — no separate Intel runner.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: '1.23'
          check-latest: true
      - name: build + bundle (arm64 + amd64 + universal)
        run: MTA_SCOPE=darwin MTA_CHECKSUMS=0 ./scripts/build-all.sh "${{ inputs.version }}"
      - uses: actions/upload-artifact@v4
        with:
          name: dist-darwin
          path: out/*
          retention-days: 14
