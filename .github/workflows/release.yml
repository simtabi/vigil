name: Release

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { runner: macos-latest,   goos: darwin,  goarch: arm64, cgo: '1' }
          - { runner: macos-13,       goos: darwin,  goarch: amd64, cgo: '1' }
          - { runner: windows-latest, goos: windows, goarch: amd64, cgo: '0' }
          - { runner: ubuntu-latest,  goos: linux,   goarch: amd64, cgo: '0' }
          - { runner: ubuntu-latest,  goos: linux,   goarch: arm64, cgo: '0' }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          check-latest: true

      - name: Build
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: ${{ matrix.cgo }}
        run: |
          VERSION="${GITHUB_REF_NAME}"
          OUT="mta"
          [ "$GOOS" = "windows" ] && OUT="mta.exe"
          mkdir -p dist
          go build -trimpath \
            -ldflags "-s -w -X github.com/simtabi/ms-teams-activity/cmd.version=${VERSION} -X github.com/simtabi/ms-teams-activity/cmd.commit=${GITHUB_SHA} -X github.com/simtabi/ms-teams-activity/cmd.date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -o "dist/${OUT}" .
          NAME="mta_${VERSION}_${GOOS}_${GOARCH}"
          cd dist
          if [ "$GOOS" = "windows" ]; then
            7z a "${NAME}.zip" "${OUT}" >/dev/null
            sha256sum "${NAME}.zip" > "${NAME}.zip.sha256"
          else
            tar -czf "${NAME}.tar.gz" "${OUT}"
            shasum -a 256 "${NAME}.tar.gz" > "${NAME}.tar.gz.sha256"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: mta_${{ matrix.goos }}_${{ matrix.goarch }}
          path: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Extract changelog section
        id: notes
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Pull the body of the matching ## [VERSION] section from CHANGELOG.md.
          awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" {grab=1; next}
            grab && /^## \[/ {exit}
            grab {print}
          ' CHANGELOG.md > body.md
          if [ ! -s body.md ]; then echo "See CHANGELOG.md for details." > body.md; fi

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          body_path: body.md
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.sha256
