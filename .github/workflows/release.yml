name: Release

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { runner: macos-latest,   goos: darwin,  goarch: arm64, cgo: '1' }
          - { runner: macos-13,       goos: darwin,  goarch: amd64, cgo: '1' }
          - { runner: windows-latest, goos: windows, goarch: amd64, cgo: '0' }
          - { runner: ubuntu-latest,  goos: linux,   goarch: amd64, cgo: '0' }
          - { runner: ubuntu-latest,  goos: linux,   goarch: arm64, cgo: '0' }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          check-latest: true

      - name: Build + archive
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: ${{ matrix.cgo }}
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME}"
          OUTDIR="dist/mta_${GOOS}_${GOARCH}"
          BIN="mta"; [ "$GOOS" = "windows" ] && BIN="mta.exe"
          mkdir -p "$OUTDIR"
          go build -trimpath \
            -ldflags "-s -w -X github.com/simtabi/ms-teams-activity/internal/cli.version=${VERSION} -X github.com/simtabi/ms-teams-activity/internal/cli.commit=${GITHUB_SHA} -X github.com/simtabi/ms-teams-activity/internal/cli.date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -o "${OUTDIR}/${BIN}" ./cmd/mta
          mkdir -p out
          # Version-less archive name keeps the self-update contract stable.
          NAME="mta_${GOOS}_${GOARCH}"
          if [ "$GOOS" = "windows" ]; then
            (cd "$OUTDIR" && 7z a "../../out/${NAME}.zip" "$BIN" >/dev/null)
          else
            tar -C "$OUTDIR" -czf "out/${NAME}.tar.gz" "$BIN"
          fi

      - name: Build deb/rpm (linux)
        if: matrix.goos == 'linux'
        shell: bash
        env:
          GOARCH: ${{ matrix.goarch }}
        run: |
          set -euo pipefail
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest
          export VERSION="${GITHUB_REF_NAME#v}"
          export ARCH="${GOARCH}"
          mkdir -p out
          "$(go env GOPATH)/bin/nfpm" pkg --config nfpm.yaml --packager deb --target out/
          "$(go env GOPATH)/bin/nfpm" pkg --config nfpm.yaml --packager rpm --target out/

      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.goos }}-${{ matrix.goarch }}
          path: out/*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: collected
          merge-multiple: true

      - name: Checksums + release notes
        shell: bash
        run: |
          set -euo pipefail
          cd collected
          sha256sum * > checksums.txt
          cd ..
          VERSION="${GITHUB_REF_NAME#v}"
          awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" {grab=1; next}
            grab && /^## \[/ {exit}
            grab {print}
          ' CHANGELOG.md > notes.md
          [ -s notes.md ] || echo "See CHANGELOG.md." > notes.md

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          body_path: notes.md
          generate_release_notes: true
          files: collected/*

  brew-scoop:
    needs: release
    runs-on: ubuntu-latest
    continue-on-error: true # tap/bucket repos + TAP_GITHUB_TOKEN must exist
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: collected
          merge-multiple: true
      - name: Update Homebrew tap and Scoop bucket
        env:
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          [ -n "${TAP_GITHUB_TOKEN:-}" ] || { echo "no TAP_GITHUB_TOKEN; skipping"; exit 0; }
          VERSION="${GITHUB_REF_NAME#v}"
          base="https://github.com/simtabi/ms-teams-activity/releases/download/${GITHUB_REF_NAME}"
          sha() { sha256sum "collected/$1" | awk '{print $1}'; }

          # --- Homebrew formula ---
          git clone "https://x:${TAP_GITHUB_TOKEN}@github.com/simtabi/homebrew-tap.git" tap
          mkdir -p tap/Formula
          cat > tap/Formula/mta.rb <<EOF
          class Mta < Formula
            desc "Keep Microsoft Teams active on a configurable schedule"
            homepage "https://opensource.simtabi.com/products/ms-teams-activity"
            version "${VERSION}"
            license "MIT"
            on_macos do
              on_arm do
                url "${base}/mta_darwin_arm64.tar.gz"
                sha256 "$(sha mta_darwin_arm64.tar.gz)"
              end
              on_intel do
                url "${base}/mta_darwin_amd64.tar.gz"
                sha256 "$(sha mta_darwin_amd64.tar.gz)"
              end
            end
            on_linux do
              on_arm do
                url "${base}/mta_linux_arm64.tar.gz"
                sha256 "$(sha mta_linux_arm64.tar.gz)"
              end
              on_intel do
                url "${base}/mta_linux_amd64.tar.gz"
                sha256 "$(sha mta_linux_amd64.tar.gz)"
              end
            end
            def install
              bin.install "mta"
            end
            test do
              system "#{bin}/mta", "version"
            end
          end
          EOF
          (cd tap && git config user.email "imanimanyara@users.noreply.github.com" && git config user.name "Imani Manyara" && git add -A && git commit -m "mta ${VERSION}" && git push)

          # --- Scoop manifest ---
          git clone "https://x:${TAP_GITHUB_TOKEN}@github.com/simtabi/scoop-bucket.git" bucket
          cat > bucket/mta.json <<EOF
          {
            "version": "${VERSION}",
            "description": "Keep Microsoft Teams active on a configurable schedule",
            "homepage": "https://opensource.simtabi.com/products/ms-teams-activity",
            "license": "MIT",
            "architecture": {
              "64bit": {
                "url": "${base}/mta_windows_amd64.zip",
                "hash": "$(sha mta_windows_amd64.zip)",
                "bin": "mta.exe"
              }
            }
          }
          EOF
          (cd bucket && git config user.email "imanimanyara@users.noreply.github.com" && git config user.name "Imani Manyara" && git add -A && git commit -m "mta ${VERSION}" && git push)
