name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-test:
    name: build & test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v6
        with:
          go-version: '1.23'
          check-latest: true

      - name: gofmt
        if: runner.os != 'Windows'
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "These files need gofmt:"; echo "$unformatted"; exit 1
          fi

      - name: vet
        run: go vet ./...

      - name: build
        run: go build ./...

      - name: test
        run: go test -race ./...

  cross-compile:
    name: cross-compile (cgo-free targets)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: '1.23'
          check-latest: true
      - name: windows/amd64
        run: CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build ./...
      - name: linux/arm64
        run: CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build ./...

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: '1.23'
          check-latest: true
      - name: install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest
      - name: run
        run: "$(go env GOPATH)/bin/golangci-lint run ./..."

  # Always bundle ready-to-run binaries for the latest main (and on demand),
  # downloadable from the run's Artifacts even before a tagged release.
  snapshot:
    name: snapshot binaries
    if: github.event_name != 'pull_request'
    uses: ./.github/workflows/build-binaries.yml
    with:
      version: 0.0.0-dev+${{ github.sha }}
